services:
  - type: web
    name: nfl-oracle
    runtime: python
    buildCommand: pip install --upgrade pip setuptools wheel && pip install --no-deps nfl_data_py==0.3.3 && pip install -r requirements.txt && python -m scripts.train
    startCommand: python run.py --prod
    envVars:
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RENDER
        value: true
      - key: RESEND_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      - key: SITE_URL
        sync: false
      - key: ODDS_API_KEY
        sync: false